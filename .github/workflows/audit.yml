name: Dependency Vulnerability Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies & Scanners
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit openpyxl
        echo "Pip-audit and openpyxl installed successfully."

    - name: Run Dependency Audit and Generate Excel Report
      run: python run_audit_tests.py

    - name: Upload Excel Security Audit Report
      uses: actions/upload-artifact@v4
      with:
        name: SkyRoster-300-Security-Audit-Report
        path: SkyRoster_300_Audit_Test_Report.xlsx
