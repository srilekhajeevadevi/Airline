name: Backend Load Testing with k6

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install k6
      run: |
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5DCC117B3C122DD355A51C8B227B30FA40E8C4A
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
        echo "k6 installed successfully."

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Run k6 Load Tests and Generate Excel Report
      run: python run_k6_tests.py

    - name: Upload Excel Load Test Report
      uses: actions/upload-artifact@v4
      with:
        name: SkyRoster-300-k6-Load-Test-Report
        path: SkyRoster_300_k6_Load_Test_Report.xlsx
