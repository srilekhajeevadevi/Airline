name: Selenium E2E Automation Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java (required for Flutter build)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Build Flutter Web App
      run: flutter build web --web-renderer html

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium openpyxl webdriver-manager

    - name: Start local Web Server
      run: |
        python -m http.server 8000 --directory build/web &
        echo "Local web server started in background."

    - name: Wait for server to be responsive
      run: |
        until curl --silent --fail http://localhost:8000; do
          echo "Waiting for web server to start..."
          sleep 2
        done
        echo "Web server is up and running!"

    - name: Run E2E Selenium Tests and Generate Excel Report
      run: python run_selenium_tests.py

    - name: Upload Excel Test Report
      uses: actions/upload-artifact@v4
      with:
        name: SkyRoster-300-E2E-Test-Report
        path: SkyRoster_300_E2E_Test_Report.xlsx
