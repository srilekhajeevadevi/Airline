name: Appium Mobile Web Automation Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java (required for Flutter build)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Build Flutter Web App
      run: flutter build web

    - name: Setup Node.js (required for Appium)
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Appium and Web Drivers
      run: |
        npm install -g appium
        appium driver install chromium
        echo "Appium server and Chromium driver installed successfully."

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Appium-Python-Client openpyxl

    - name: Start local Web Server
      run: |
        python -m http.server 8000 --directory build/web &
        echo "Local web server started in background on port 8000."

    - name: Start Appium Server
      run: |
        appium --port 4723 &
        echo "Appium server started in background on port 4723."

    - name: Wait for servers to be active
      run: |
        until curl --silent --fail http://localhost:8000; do
          echo "Waiting for web server..."
          sleep 2
        done
        echo "Web server is active!"
        
        # Wait briefly for Appium server to start listening
        sleep 5
        echo "Appium server ready!"

    - name: Run E2E Appium Tests and Generate Excel Report
      run: python run_appium_tests.py

    - name: Upload Excel Appium Test Report
      uses: actions/upload-artifact@v4
      with:
        name: SkyRoster-300-Appium-Test-Report
        path: SkyRoster_300_Appium_Test_Report.xlsx
